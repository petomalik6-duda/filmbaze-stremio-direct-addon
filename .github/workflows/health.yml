name: Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Smoke test
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          MAX_ITEMS_PER_TYPE: 3
        run: |
          node server.js &
          sleep 8
          curl -f http://127.0.0.1:10000/manifest.json
          curl -f http://127.0.0.1:10000/catalog/movie/filmbaze_cz_dabing.json
