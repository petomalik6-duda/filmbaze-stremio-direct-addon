name: Update Filmbaze Cache

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Update cache
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: npm run update-cache

      - name: Commit cache
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add catalog-cache.json
          git commit -m "Update catalog cache" || echo "No changes"
          git push
